name: Node.js Syntax Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JavaScript syntax
        run: |
          echo "Running node --check on all .js files..."
          errors=0
          while IFS= read -r file; do
            if ! node --check "$file" 2>&1; then
              errors=$((errors + 1))
            fi
          done < <(find . -name '*.js' -not -path './node_modules/*' -not -path './.git/*')

          if [ "$errors" -gt 0 ]; then
            echo "Found syntax errors in $errors file(s)"
            exit 1
          fi
          echo "All JavaScript files passed syntax check."
